<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — TAI Advisory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="theme-color" content="#1B5E4B">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',system-ui,sans-serif;background:#FAF7F2;color:#1A1612;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px}
.code{font-family:'Newsreader',Georgia,serif;font-size:clamp(4rem,12vw,7rem);font-weight:500;color:#1B5E4B;opacity:0.2;line-height:1;margin-bottom:16px}
h1{font-family:'Newsreader',Georgia,serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:500;margin-bottom:12px;letter-spacing:-0.02em}
p{font-size:0.95rem;color:#5C554B;line-height:1.7;margin-bottom:28px}
a{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:#1B5E4B;color:#fff;border-radius:100px;font-size:14px;font-weight:600;text-decoration:none;transition:all 0.3s}
a:hover{background:#237A62;transform:translateY(-2px);box-shadow:0 8px 24px rgba(27,94,75,0.18)}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back to advancing justice in technology.</p>
  <a href="/tai/">Return Home →</a>
</div>
</body>
</html>
